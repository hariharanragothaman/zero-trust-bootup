apiVersion: v1
kind: Namespace
metadata:
  name: spire-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-server
  namespace: spire-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server-config
  namespace: spire-system
data:
  server.conf: |
    server {
      bind_address = "0.0.0.0"
      bind_port    = "8081"
      trust_domain = "example.org"
      data_dir     = "/run/spire/data"
    }
    plugins {
      DataStore "sql" {
        plugin_data {
          database_type     = "sqlite3"
          connection_string = "file:/run/spire/data/datastore.sqlite3?_fk=true"
        }
      }
      KeyManager "memory" {}
      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "demo-cluster" = {
              service_account_allow_list = ["spire-system:spire-agent"]
            }
          }
        }
      }
      WorkloadAttestor "k8s" {
        plugin_data {}
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-server
  namespace: spire-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spire-server
  template:
    metadata:
      labels:
        app: spire-server
    spec:
      serviceAccountName: spire-server
      containers:
      - name: spire-server
        image: ghcr.io/spiffe/spire-server:1.8.0
        args: ["-config", "/run/spire/config/server.conf"]
        ports:
        - containerPort: 8081
        volumeMounts:
        - name: spire-config
          mountPath: /run/spire/config
        - name: spire-data
          mountPath: /run/spire/data
      volumes:
      - name: spire-config
        configMap:
          name: spire-server-config
      - name: spire-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: spire-server
  namespace: spire-system
spec:
  selector:
    app: spire-server
  ports:
  - port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent-config
  namespace: spire-system
data:
  agent.conf: |
    agent {
      data_dir       = "/run/spire/data"
      trust_domain   = "example.org"
      server_address = "spire-server"
      server_port    = "8081"
      socket_path    = "unix:///run/spire/sockets/agent.sock"
    }
    plugins {
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "demo-cluster"
        }
      }
      WorkloadAttestor "unix" {}
    }
